services:
  postgres:
    image: postgres:16-alpine
    container_name: nodejs-postgres
    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
