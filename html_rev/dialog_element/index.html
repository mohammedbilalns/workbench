<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
  </head>
  <body>
    <button>Show the dialog</button>
    <dialog closedBy="any" > 
      <!-- any means it will close when pressing esc or clicking outside -->
      <p>This is a dialog</p>
    </dialog>

    <script>
    document.querySelector("button").addEventListener("click", ()=>{
      document.querySelector("dialog").show()// display the dialog 
      document.querySelector("dialog").showModal() // show as modal (disable outside interactivity )
    })
    
    </script>
  
  </body>
</html>
